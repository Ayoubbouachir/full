  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!--=== Public Website Scripts ===-->

    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/mobile-menu.js"></script>

    <!--=== Admin Dashboard Scripts ===-->
    <!-- Avoiding duplicate jquery/bootstrap -->
    <!-- Removed dashborad.apexcharts.js - conflicts with react-apexcharts -->

    <!-- Admin Inline Script -->
    <script>
      // This script was in the dashboard index.html for password visibility toggle
      // We wrap it in a document ready to be safe, though inline usually runs immediately.
      // However, we need to ensure this logic applies to elements dynamically created by React.
      // Originally this was likely for static templates. In React, this should be a Component logic.
      // But I will leave it here just in case some static parts rely on it or if it was efficiently global.
      $(document).on("click", "#eye ,#eye1", function () {
        $(this).toggleClass("fa-eye fa-eye-slash");
        var input = $(this).parent().find("input");
        if (input.attr("type") == "password") {
          input.attr("type", "text");
        } else {
          input.attr("type", "password");
        }
      });
    </script>
  </body>
