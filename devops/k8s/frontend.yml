apiVersion: apps/v1
kind: Deployment
metadata:
  name: fullstakers-frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fullstakers-frontend
  template:
    metadata:
      labels:
        app: fullstakers-frontend
    spec:
      containers:
      - name: frontend
        image: salimhz/fullstakers-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: fullstakers-frontend-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: fullstakers-frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30002
