apiVersion: apps/v1
kind: Deployment
metadata:
  name: fullstakers-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fullstakers-backend
  template:
    metadata:
      labels:
        app: fullstakers-backend
    spec:
      containers:
      - name: backend
        image: salimhz/fullstakers-backend:latest
        imagePullPolicy: Always
        env:
        - name: MONGO_URI
          value: "mongodb://host.minikube.internal:27017/fullstackers"
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: fullstakers-backend-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: fullstakers-backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30001
